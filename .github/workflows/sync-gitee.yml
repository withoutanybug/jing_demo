name: Sync GitHub to Gitee
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 用内置GITHUB_TOKEN拉取代码，不需要GitHub SSH密钥
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 修复 dubious ownership 警告
      - name: Fix git safe directory
        run: git config --global --add safe.directory /github/workspace

      # 同步到Gitee，只需要你之前配置的GITEE_RSA_PRIVATE_KEY
      - name: Mirror to Gitee
        uses: wearerequired/git-mirror-action@v1
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_RSA_PRIVATE_KEY }}
        with:
          source-repo: https://github.com/withoutanybug/jing_demo.git
          destination-repo: git@gitee.com:luckyLUJJ/jing_demo.git